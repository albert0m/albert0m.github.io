<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concorso - Prova</title>
    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        body { font-family: sans-serif; margin: 0; padding: 40px; background: #f5f5f5; }
        h1 { color: #1a73e8; }
        .card { background: white; border-radius: 12px; padding: 24px; margin: 16px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>Portale Concorso</h1>
    <div class="card">
        <h2>Benvenuto</h2>
        <p>Questa è una pagina di esempio servita in modalità TWA (Trusted Web Activity).</p>
        <p>Nessuna UI di Chrome è visibile: niente toolbar, niente X, niente menu.</p>
    </div>
    <div class="card">
        <h2>Info</h2>
        <p>Server locale: <strong>http://DEVICE_IP:8080</strong></p>
        <p>Il file <code>/.well-known/assetlinks.json</code> dichiara la nostra app come trusted.</p>
    </div>
</body>
</html>
